add_newline = true

# ----------------------------------------------------
# format
# ----------------------------------------------------
format = """
${custom.hostname}\
$directory\
$git_branch\
$git_status\
$direnv\
$python\
$aws\
${custom.gcloud}\
[](fg:#2c313a)\
$fill\
$cmd_duration\

$character\
"""

# Enable if it appears on the same line as the command
# right_format = """
# $cmd_duration\
# $time\
# """

# ----------------------------------------------------
# left module
# ----------------------------------------------------
[python]
format = "[│](bg:#2c313a fg:#3f4451)[ $virtualenv ](bg:#2c313a fg:#d18f52)"
style = "bg:#2c313a fg:#d18f52"

[fill]
symbol = ' '

[directory]
truncation_length = 6
truncation_symbol = ' '
truncate_to_repo = false
home_symbol = '~'
read_only = ' 󰌾'
format = "[  $path$read_only ](bg:#2c313a fg:#c162de)"
style = "bg:#2c313a fg:#c162de"
read_only_style = "bg:#2c313a fg:#c162de"

[direnv]
disabled = false
format = "[│](bg:#2c313a fg:#3f4451)[ $symbol$allowed ](bg:#2c313a fg:#8cc265)"
style = "bg:#2c313a fg:#8cc265"

[git_branch]
symbol = ""
format = "[│](bg:#2c313a fg:#3f4451)[  $branch ](bg:#2c313a fg:#42b3c2)"
style = "bg:#2c313a fg:#42b3c2"

[git_status]
format = "[$all_status$ahead_behind ](bg:#2c313a fg:#42b3c2)"
style = "bg:#2c313a fg:#42b3c2"

# ----------------------------------------------------
# right module
# ----------------------------------------------------
[cmd_duration]
min_time = 1
style = "fg:#d18f52"
format = "[ $duration ](fg:#d18f52)"

[time]
disabled = false
time_format = "%R"
format = '[[  $time](fg:#3f4451)]($style)'

[custom.hostname]
when = "true"
command = "scutil --get LocalHostName 2>/dev/null || scutil --get ComputerName 2>/dev/null || hostnamectl --static 2>/dev/null || hostname -s 2>/dev/null || hostname"
format = "[ 󰌢 $output ](bg:#3f4451 fg:#abb2bf)[](fg:#3f4451 bg:#2c313a)"
style = "bg:#3f4451 fg:#abb2bf"

# ----------------------------------------------------
# prompt module
# ----------------------------------------------------
[character]
vimcmd_symbol = '[V](bold #8cc265) '

# ----------------------------------------------------
# AWS module
# ----------------------------------------------------
[aws]
format = "[│](bg:#2c313a fg:#3f4451)[ $symbol $profile ](bg:#2c313a fg:#d18f52)"
symbol = "💭"
style = "bg:#2c313a fg:#d18f52"

# ----------------------------------------------------
# GCP module
# ----------------------------------------------------
[gcloud]
disabled = true

[custom.gcloud]
when = "command -v gcloud && command -v terraform"
command = '''
f=~/.config/gcloud/configurations/config_$(cat ~/.config/gcloud/active_config 2>/dev/null || echo default)
a=$(perl -ne 'print $1 if /^account\s*=\s*[^@]*@(.+)/' "$f" 2>/dev/null)
p=$(perl -ne 'print $1 if /^project\s*=\s*(.+)/' "$f" 2>/dev/null)
[ -n "$a" ] && echo "☁️ ${a}(${p})"
'''
format = "[│](bg:#2c313a fg:#3f4451)[ $output ](bg:#2c313a fg:#42b3c2)"
style = "bg:#2c313a fg:#42b3c2"
