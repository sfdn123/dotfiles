add_newline = true

# ----------------------------------------------------
# format
# ----------------------------------------------------
format = """
$directory\
$git_branch\
$git_status\
$direnv\
$python\
$aws\
${custom.gcloud}\
$fill\
$cmd_duration\
$time\

$character\
"""

# Enable if it appears on the same line as the command
# right_format = """
# $cmd_duration\
# $time\
# """

# ----------------------------------------------------
# left module
# ----------------------------------------------------
[python]
format = """
[î‚؛](fg:#E6DB74)\
[$virtualenv]($style)\
[î‚¼](fg:#E6DB74)\
"""
style = "bold fg:#272822 bg:#E6DB74"

[fill]
symbol = 'â”€'

[directory]
truncation_length = 6
truncation_symbol = 'ïپ¼ '
truncate_to_repo = false
home_symbol = '~'
read_only = ' َ°Œ¾ '
format = """
[î‚¶](fg:#66D9EF)\
[$path]($style)\
[$read_only]($read_only_style)\
[î‚¼](fg:#66D9EF)\
"""
style = 'bold fg:#272822 bg:#66D9EF'
read_only_style = 'bold fg:#272822 bg:#66D9EF'

[direnv]
disabled = false
format = """
[î‚؛](fg:#A6E22E)\
[$symbol$allowed]($style)\
[î‚¼](fg:#A6E22E)\
"""
style = "bold fg:#272822 bg:#A6E22E"

[git_branch]
symbol = "ïگک"
style = "fg:#AE81FF bg:#3E3D32"
format = """
[î‚؛](fg:#3E3D32)\
[$symbol $branch]($style)\
"""

[git_status]
style = "fg:#AE81FF bg:#3E3D32"
format = """
[$all_status$ahead_behind]($style)\
[î‚¼](fg:#3E3D32)\
"""

# ----------------------------------------------------
# right module
# ----------------------------------------------------
[cmd_duration]
min_time = 1
style = 'fg:#FD971F'
format = "[ $duration]($style)"

[time]
disabled = false
time_format = "%R"
format = '[[ ïگ؛ $time](fg:#75715E)]($style)'

# ----------------------------------------------------
# prompt module
# ----------------------------------------------------
[character]
vimcmd_symbol = '[V](bold #A6E22E) '

# ----------------------------------------------------
# AWS module
# ----------------------------------------------------
[aws]
format = '[$symbol $profile ]($style)'
symbol = "ًں’­"
style = "bold fg:#E6DB74"

# ----------------------------------------------------
# GCP module
# ----------------------------------------------------
[gcloud]
disabled = true

[custom.gcloud]
when = "command -v gcloud && command -v terraform"
command = '''
f=~/.config/gcloud/configurations/config_$(cat ~/.config/gcloud/active_config 2>/dev/null || echo default)
a=$(perl -ne 'print $1 if /^account\s*=\s*[^@]*@(.+)/' "$f" 2>/dev/null)
p=$(perl -ne 'print $1 if /^project\s*=\s*(.+)/' "$f" 2>/dev/null)
[ -n "$a" ] && echo "âکپï¸ڈ ${a}(${p})"
'''
format = "[$output]($style)"
style = "bold fg:#66D9EF"
